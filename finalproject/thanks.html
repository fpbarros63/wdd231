<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Retro Game Library</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- CSS Linking -->
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/larger.css">
    <script type="module" src="scripts/global.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const title = urlParams.get('gametitle');
            if(title) {
                document.getElementById('submitted-title').textContent = title;
            }
        });
    </script>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="logo-container">
                <img src="images/pacman.webp" alt="Retro Game Library Pacman Logo" width="40" height="40">
                <h1 id="brand">Retro Game Library</h1>
            </div>
            <button id="menu-button" aria-expanded="false" aria-label="Toggle Menu">&#9776;</button>
        </div>
        <nav id="primary-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="favorites.html">My Favorites</a></li>
                <li><a href="suggest.html">Suggest a Game</a></li>
            </ul>
        </nav>
    </header>

    <main class="thanks-main">
        <div class="hero">
            <h2>Thank You!</h2>
            <p>Your suggestion for <strong id="submitted-title">a classic game</strong> has been received.</p>
            <a href="index.html" class="submit-btn return-btn">Return to Catalog</a>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; <span id="current-year"></span> | Retro Game Library | Your Name</p>
            <p><a href="attributions.html">Attributions & Sources</a> | <a href="https://youtu.be/fVnhUEvyNmU" target="_blank">Video Demonstration</a></p>
        </div>
    </footer>
</body>
</html>
